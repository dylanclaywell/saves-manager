name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package .output
        run: zip -r pocket-quartermaster-output.zip .output

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocket-quartermaster-build
          path: pocket-quartermaster-output.zip
          retention-days: 7
          if-no-files-found: error

  release-please:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: [build, release-please]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: pocket-quartermaster-build

      - name: Stage deploy assets
        run: |
          mkdir -p release-assets
          cp pocket-quartermaster-output.zip release-assets/
          cp deploy/pqm.service release-assets/
          cp deploy/pqm.env.example release-assets/
          cp deploy/install.sh deploy/update.sh release-assets/
          cp deploy/install.ps1 deploy/install.bat release-assets/
          cp deploy/update.ps1 deploy/update.bat release-assets/
          cp deploy/run.ps1 deploy/run.bat release-assets/

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" release-assets/* --clobber

      - name: Prepend install instructions to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release view "$TAG" --json body --jq .body > current-body.md
          {
            cat deploy/release-notes-header.md
            printf '\n'
            cat current-body.md
          } > combined-notes.md
          gh release edit "$TAG" --notes-file combined-notes.md
